<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Raise Complaint • kindlink</title>
    <link rel="stylesheet" href="/assets/app.css?v=2" />
  </head>
  <body data-page="complaint">
    <header class="topbar">
      <div class="container">
        <a class="brand" href="/index.html"><span class="logo"></span> kindlink</a>
        <nav class="nav" data-nav></nav>
      </div>
    </header>
    <main class="container">
      <div class="grid">
        <div class="card col-7">
          <div class="card-body">
            <h1>Raise a complaint</h1>
            <p>Complaints are private: visible only to you and the admin.</p>
            <form id="complaintForm">
              <label for="taskId">Task ID</label>
              <input id="taskId" required placeholder="Task ID" />
              <label for="reason">Reason</label>
              <textarea id="reason" required placeholder="Explain what happened..."></textarea>
              <div class="actions">
                <button class="btn primary" type="submit">Submit</button>
                <a class="btn" href="/my-complaints.html">My complaints</a>
              </div>
            </form>
          </div>
        </div>
        <div class="card col-5">
          <div class="card-body">
            <h2>Rule</h2>
            <p>The person you complain about cannot view your complaint.</p>
          </div>
        </div>
      </div>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <footer class="footer">kindlink • built for community trust</footer>
    <script src="/assets/app.js?v=2"></script>
  </body>
</html>
